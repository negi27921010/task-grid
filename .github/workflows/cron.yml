# Scheduled jobs for Task Grid — runs on GitHub-hosted runners and hits
# /api/cron/dispatch on the production deployment.
#
# Why GitHub Actions instead of Vercel Cron:
#   Vercel Hobby plan now allows max 1 cron job per project, running at
#   most once per day. Our schedule needs 4 distinct IST time slots
#   (10:30 AM, 11:00 AM, 6:00 PM, 6:30 PM) — that's a Pro-plan-only
#   pattern on Vercel. GitHub Actions cron is free, per-minute granular,
#   and just calls our HTTP endpoint with the shared secret.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   PROD_URL      — e.g. https://taskflow-puce-nine.vercel.app
#   CRON_SECRET   — same value as the Vercel env var of the same name

name: Scheduled standup nudges

on:
  schedule:
    # GitHub Actions cron is UTC. IST is UTC+5:30.
    # Day-of-week field `1-6` = Mon–Sat (cron Sunday = 0). All 4 slots
    # land mid-day in IST so the IST weekday matches the UTC weekday;
    # no day-boundary edge cases.
    - cron: '0 5 * * 1-6'    # 10:30 AM IST Mon–Sat → morning_standup_nudge
    - cron: '30 5 * * 1-6'   # 11:00 AM IST Mon–Sat → eta_nudge + admin_defaulter_digest
    - cron: '30 12 * * 1-6'  # 06:00 PM IST Mon–Sat → evening_closure_nudge
    - cron: '0 13 * * 1-6'   # 06:30 PM IST Mon–Sat → admin_evening_digest
  workflow_dispatch:        # also allow manual trigger from the Actions tab
    inputs:
      job:
        description: 'Force a specific job (morning|evening|eta|defaulter|evening-digest). Leave empty for time-of-day match.'
        required: false
        default: ''

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit the cron dispatcher
        env:
          PROD_URL:    ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE_JOB:   ${{ inputs.job }}
          # The cron expression that fired this run (empty for
          # workflow_dispatch). Used to map schedule → job(s) so a
          # delayed firing still runs the right job — the dispatcher's
          # time-bucket fallback can't catch a 2h+ GH Actions delay.
          SCHEDULE:    ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [ -z "$PROD_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing PROD_URL or CRON_SECRET in repo secrets"
            exit 1
          fi

          # Schedule → list of job names (space-separated). The 11:00 AM IST
          # slot fires TWO jobs back-to-back; the dispatcher endpoint runs
          # one job per call so we loop.
          if [ -n "$FORCE_JOB" ]; then
            JOBS="$FORCE_JOB"
          else
            case "$SCHEDULE" in
              "0 5 * * 1-6")    JOBS="morning" ;;
              "30 5 * * 1-6")   JOBS="eta defaulter" ;;
              "30 12 * * 1-6")  JOBS="evening" ;;
              "0 13 * * 1-6")   JOBS="evening-digest" ;;
              *)                JOBS="" ;;
            esac
          fi

          if [ -z "$JOBS" ]; then
            # No mapping (e.g. workflow_dispatch with empty input) — fall
            # back to the dispatcher's time-of-day matcher.
            echo "Calling $PROD_URL/api/cron/dispatch (time-matched)"
            STATUS=$(curl -s -o /tmp/body.txt -w '%{http_code}' \
              --max-time 60 "$PROD_URL/api/cron/dispatch?secret=$CRON_SECRET")
            echo "HTTP $STATUS"
            cat /tmp/body.txt; echo
            [ "$STATUS" -lt 400 ] || { echo "::error::HTTP $STATUS"; exit 1; }
            exit 0
          fi

          FAILED=0
          for job in $JOBS; do
            echo "─── job=$job ───"
            STATUS=$(curl -s -o /tmp/body.txt -w '%{http_code}' \
              --max-time 60 \
              "$PROD_URL/api/cron/dispatch?secret=$CRON_SECRET&job=$job")
            echo "HTTP $STATUS"
            cat /tmp/body.txt; echo
            if [ "$STATUS" -ge 400 ]; then
              echo "::warning::job=$job returned HTTP $STATUS"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED job(s) failed"
            exit 1
          fi
